name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level moderate
      - run: pnpm verify
      - run: pnpm --dir apps/mobile doctor
      - run:
          pnpm --dir apps/mobile exec expo export --platform ios --output-dir
          /tmp/driftline-ios-export
      - run:
          pnpm --dir apps/mobile exec expo export --platform android --output-dir
          /tmp/driftline-android-export
